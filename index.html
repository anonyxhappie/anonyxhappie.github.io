<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshay Saini - The Developer Gazette</title>
  <meta name="description"
    content="Single-sheet paper physics portfolio with newspaper-style typography and realistic drag response." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Newspaper Typography: Playfair Display for headers, Source Serif 4 for body -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 14%, #f7f2e7 0, #ebe4d8 42%, #e5dfd3 100%);
      font-family: 'Source Serif 4', serif;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    #stage.dragging {
      cursor: grabbing;
    }
  </style>
</head>

<body>
  <canvas id="stage" aria-label="Interactive newspaper portfolio canvas"></canvas>

  <script>
    (function () {
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d");
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function getDateline() {
        const d = new Date();
        const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
        // e.g. "Friday, March 27, 2026" -> uppercase to match masthead style
        const formatted = d.toLocaleDateString('en-US', opts).toUpperCase();
        return `${formatted}`;
      }

      const CONTENT = {
        headerName: "Akshay Saini",
        tagline: "SOFTWARE ENGINEER",
        dateline: getDateline(),
        summary: "Building reliable backend systems and platform foundations — from high-throughput microservices to production cloud infrastructure. A specialist in reliability, observability, and engineering velocity.",
        experiences: [
          {
            company: "FRANKLIN TEMPLETON",
            role: "Senior Software Engineer (Present)",
            desc: "Pioneering backend + platform work for enterprise financial systems with a focus on reliability, cloud operations, and engineering velocity."
          },
          {
            company: "SECOMIND.AI",
            role: "Senior Software Engineer (Previous)",
            desc: "Directed core services for AI‑powered IoT/edge platforms, including telemetry pipelines and production infrastructure."
          },
          {
            company: "CHINGARI",
            role: "Senior Software Engineer (Previous)",
            desc: "Scaled backend services for a 50M+ user social platform; improved throughput and resilience across distributed systems."
          }
        ],
        skills: ["Python", "Java", "TypeScript", "JavaScript", "Microservices", "REST APIs", "Kubernetes", "Docker", "Linux", "AWS", "GCP", "Solidity", "Web3", "IOT", "AI", "LLM"],
        contact: {
          email: "heyakshaysaini@gmail.com",
          github: "github.com/anonyxhappie",
          linkedin: "linkedin.com/in/anonyxhappie"
        },
        instruction: ""
      };

      const CONFIG = {
        // base grid resolution (will be scaled up on high-dpi / large screens)
        BASE_GRID_X: 36,
        BASE_GRID_Y: 54,
        GRID_X: 36,
        GRID_Y: 54,
        // more solver iterations for softer cloth stability
        iterations: 36,
        // lower stretch stiffness for cloth-like behavior
        paperStiffness: 0.55,
        // cloth resists compression differently
        compressionStiff: 0.02,
        // lower bend stiffness so folds form more naturally
        bendStiffness: 0.35,
        // slightly less damping so cloth has a softer motion
        damping: 0.92,
        // gravity a bit higher to accentuate drape
        gravity: 0.02,
        wind: prefersReducedMotion ? 0.0 : 0.014,
        dragForce: 0.38,
        dragRadius: 240,
        homePull: 0.045,
        shadingIntensity: 0.5,
        shadowAlpha: 0.12
      };

      // Debug / tweakable settings (live UI will modify these)
      window.DEBUG_SETTINGS = {
        meshScale: null,        // null = auto, or integer 1..3
        contentScale: null,     // null = auto (dpr-based) or integer 1..3
        subdivision: 1,         // per-quad render subdivision (1..4)
        weaveDensity: 1.0,      // 0.2..2.0 multiplier
        backTintAlpha: 0.55,    // backface tint alpha
        backBlur: 3,            // blur px multiplier
      };

      const state = {
        w: 0,
        h: 0,
        sheetW: 0,
        sheetH: 0,
        points: [],
        constraints: [],
        frame: 0,
        pinnedPoint: null,
        pointer: { active: false, down: false, x: 0, y: 0 },
        contentCanvas: document.createElement("canvas"),
        contentCtx: null,
        // backface texture canvas (desaturated + blurred) to avoid text bleed-through
        backCanvas: document.createElement("canvas"),
        backCtx: null
      };
      state.contentCtx = state.contentCanvas.getContext("2d");
      state.backCtx = state.backCanvas.getContext("2d");

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function idx(x, y) { return y * (CONFIG.GRID_X + 1) + x; }

      function resize() {
        state.w = window.innerWidth;
        state.h = window.innerHeight;
        canvas.width = Math.floor(state.w * dpr);
        canvas.height = Math.floor(state.h * dpr);
        canvas.style.width = state.w + "px";
        canvas.style.height = state.h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // adaptive mesh scaling: increase mesh density on high-DPR or large screens
        // allow override from DEBUG_SETTINGS.meshScale (1..3)
        let meshScale = (dpr >= 2 || Math.max(state.w, state.h) > 1400) ? 2 : 1;
        if (window.DEBUG_SETTINGS && Number.isFinite(window.DEBUG_SETTINGS.meshScale)) {
          meshScale = Math.max(1, Math.min(3, Math.floor(window.DEBUG_SETTINGS.meshScale)));
        }
        CONFIG.GRID_X = Math.max(12, Math.floor(CONFIG.BASE_GRID_X * meshScale));
        CONFIG.GRID_Y = Math.max(12, Math.floor(CONFIG.BASE_GRID_Y * meshScale));

        const isMobile = state.w < 768;
        state.sheetW = isMobile ? Math.min(state.w * 0.92, 780) : Math.min(state.w * 0.85, 780);
        state.sheetH = isMobile ? Math.min(state.h * 0.92, 1100) : Math.min(state.h * 0.88, 1100);
        rebuildMesh();
        renderContentTexture();
      }

      function rebuildMesh() {
        const left = (state.w - state.sheetW) * 0.5;
        const top = (state.h - state.sheetH) * 0.5;
        state.points.length = 0;
        state.constraints.length = 0;

        for (let y = 0; y <= CONFIG.GRID_Y; y++) {
          for (let x = 0; x <= CONFIG.GRID_X; x++) {
            const u = x / CONFIG.GRID_X;
            const v = y / CONFIG.GRID_Y;
            const px = left + u * state.sheetW;
            const py = top + v * state.sheetH;
            // add curvature accumulator for wrinkle detection
            state.points.push({ x: px, y: py, px, py, homeX: px, homeY: py, u, v, curv: 0 });
          }
        }

        function addConstraint(a, b, stiff) {
          const p1 = state.points[a], p2 = state.points[b];
          state.constraints.push({ a, b, len: Math.hypot(p2.x - p1.x, p2.y - p1.y), stiff });
        }

        for (let y = 0; y <= CONFIG.GRID_Y; y++) {
          for (let x = 0; x <= CONFIG.GRID_X; x++) {
            if (x < CONFIG.GRID_X) addConstraint(idx(x, y), idx(x + 1, y), CONFIG.paperStiffness);
            if (y < CONFIG.GRID_Y) addConstraint(idx(x, y), idx(x, y + 1), CONFIG.paperStiffness);
            if (x < CONFIG.GRID_X && y < CONFIG.GRID_Y) addConstraint(idx(x, y), idx(x + 1, y + 1), CONFIG.bendStiffness);
            if (x > 0 && y < CONFIG.GRID_Y) addConstraint(idx(x, y), idx(x - 1, y + 1), CONFIG.bendStiffness);
          }
        }
      }

      function renderContentTexture() {
        // sheet size in logical pixels
        const sheetW = Math.floor(state.sheetW), sheetH = Math.floor(state.sheetH);
        // upsample content on high-DPR displays to reduce visible triangle faceting
        let contentScale = (dpr >= 2) ? 2 : 1;
        if (window.DEBUG_SETTINGS && Number.isFinite(window.DEBUG_SETTINGS.contentScale)) {
          contentScale = Math.max(1, Math.min(3, Math.floor(window.DEBUG_SETTINGS.contentScale)));
        }
        const cw = sheetW * contentScale, ch = sheetH * contentScale;
        state.contentCanvas.width = cw; state.contentCanvas.height = ch;
        const g = state.contentCtx;
        // scale drawing so we can use logical sizes (sheetW/sheetH) below
        g.setTransform(contentScale, 0, 0, contentScale, 0, 0);

        // ensure backCanvas matches content size
        state.backCanvas.width = cw; state.backCanvas.height = ch;
        const b = state.backCtx;

        // Paper (cloth) background with subtle texture (drawn in logical pixels)
        g.fillStyle = "#f5f0e6";
        g.fillRect(0, 0, sheetW, sheetH);
        for (let i = 0; i < 6000; i++) {
          g.fillStyle = "rgba(40,30,20," + (Math.random() * 0.05).toFixed(3) + ")";
          g.fillRect(Math.random() * sheetW, Math.random() * sheetH, 1, 1);
        }

        const pad = Math.floor(sheetW * 0.07);
        let y = pad + 20;

        // Masthead (Newspaper Title)
        g.textAlign = "center";
        g.fillStyle = "#1a1a1a";
        g.font = "900 " + Math.max(28, Math.floor(sheetW * 0.08)) + "px 'Playfair Display', serif";
        g.fillText(CONTENT.headerName, sheetW / 2, y);
        y += Math.max(20, Math.floor(sheetW * 0.05));

        // Thin horizontal rule
        g.strokeStyle = "#1a1a1a";
        g.lineWidth = 1.5;
        g.beginPath(); g.moveTo(pad, y); g.lineTo(sheetW - pad, y); g.stroke();
        y += 22;

        // Dateline
        g.font = "700 " + Math.max(10, Math.floor(sheetW * 0.02)) + "px 'Source Serif 4', serif";
        g.fillText(CONTENT.dateline, sheetW / 2, y);
        y += 18;

        // Double horizontal rule
        g.lineWidth = 3;
        g.beginPath(); g.moveTo(pad, y); g.lineTo(sheetW - pad, y); g.stroke();
        g.lineWidth = 1;
        g.beginPath(); g.moveTo(pad, y + 6); g.lineTo(sheetW - pad, y + 6); g.stroke();
        y += 40;

        // Tagline
        g.font = "italic 700 " + Math.max(14, Math.floor(sheetW * 0.035)) + "px 'Playfair Display', serif";
        g.fillText(CONTENT.tagline, sheetW / 2, y);
        y += Math.max(30, Math.floor(sheetW * 0.05));

        // Summary (Lead Paragraph)
        g.textAlign = "left";
        g.fillStyle = "#262626";
        g.font = "500 " + Math.max(12, Math.floor(sheetW * 0.028)) + "px 'Source Serif 4', serif";
        y = wrapText(g, CONTENT.summary, pad, y, sheetW - pad * 2, Math.max(16, Math.floor(sheetW * 0.042)));
        y += Math.max(20, Math.floor(sheetW * 0.04));

        // Section: EXPERIENCE
        y += 45;
        for (const exp of CONTENT.experiences) {
          g.fillStyle = "#1a1a1a";
          g.font = "900 " + Math.max(11, Math.floor(sheetW * 0.026)) + "px 'Playfair Display', serif";
          g.fillText(exp.company, pad, y);
          y += Math.max(14, Math.floor(sheetW * 0.032));
          g.fillStyle = "#333";
          g.font = "italic 600 " + Math.max(10, Math.floor(sheetW * 0.022)) + "px 'Source Serif 4', serif";
          g.fillText(exp.role, pad, y);
          y += Math.max(14, Math.floor(sheetW * 0.032));
          g.fillStyle = "#262626";
          g.font = "400 " + Math.max(10, Math.floor(sheetW * 0.022)) + "px 'Source Serif 4', serif";
          y = wrapText(g, exp.desc, pad, y, sheetW - pad * 2, Math.max(14, Math.floor(sheetW * 0.032)));
          y += 18;
        }

        // Section: SKILLS
        y += 45;
        g.fillStyle = "#262626";
        g.font = "600 " + Math.max(9, Math.floor(sheetW * 0.02)) + "px 'Source Serif 4', serif";
        const skillsText = CONTENT.skills.join("  |  ");
        y = wrapText(g, skillsText, pad, y, sheetW - pad * 2, Math.max(12, Math.floor(sheetW * 0.035)));
        y += 25;

        // Section: CONTACT
        y += 45;
        g.font = "600 " + Math.max(10, Math.floor(sheetW * 0.022)) + "px 'Source Serif 4', serif";
        g.fillText("Email: " + CONTENT.contact.email, pad, y); y += Math.max(14, Math.floor(sheetW * 0.028));
        g.fillText("GitHub: " + CONTENT.contact.github, pad, y); y += Math.max(14, Math.floor(sheetW * 0.028));
        g.fillText("LinkedIn: " + CONTENT.contact.linkedin, pad, y);

        // Instruction
        g.textAlign = "center";
        g.fillStyle = "#666";
        g.font = "italic 500 " + Math.floor(sheetW * 0.018) + "px 'Source Serif 4', serif";
        g.fillText(CONTENT.instruction, sheetH * 0.5, sheetH - 40);

        // Build a woven/cloth backface texture from the content canvas to read like fabric
        try {
          b.clearRect(0, 0, cw, ch);
          // Copy the content but heavily blur/soften to remove legible text
          const blurPx = (window.DEBUG_SETTINGS && window.DEBUG_SETTINGS.backBlur) ? window.DEBUG_SETTINGS.backBlur * contentScale : (2 * contentScale);
          b.filter = 'blur(' + blurPx + 'px)';
          b.drawImage(state.contentCanvas, 0, 0);
          b.filter = 'none';
          // apply a subtle desaturate/warm tint
          b.globalCompositeOperation = 'multiply';
          const tintAlpha = (window.DEBUG_SETTINGS && window.DEBUG_SETTINGS.backTintAlpha) ? window.DEBUG_SETTINGS.backTintAlpha : 0.55;
          b.fillStyle = 'rgba(230,220,200,' + tintAlpha + ')';
          b.fillRect(0, 0, cw, ch);
          b.globalCompositeOperation = 'source-over';

          // draw a small woven pattern to suggest cloth fibers (pattern scales with DPI)
          const weaveMult = (window.DEBUG_SETTINGS && window.DEBUG_SETTINGS.weaveDensity) ? window.DEBUG_SETTINGS.weaveDensity : 1.0;
          const patternSize = Math.max(2, Math.floor(Math.min(cw, ch) / (120 / contentScale / weaveMult)));
          b.fillStyle = 'rgba(0,0,0,0.03)';
          for (let y2 = 0; y2 < ch; y2 += patternSize * 2) {
            for (let x2 = 0; x2 < cw; x2 += patternSize * 2) {
              b.fillRect(x2, y2, patternSize, patternSize);
              b.fillRect(x2 + patternSize, y2 + patternSize, patternSize, patternSize);
            }
          }

          // subtle noise overlay
          b.globalAlpha = 0.06;
          b.fillStyle = '#000';
          for (let i = 0; i < Math.floor(cw * ch * 0.000018); i++) {
            b.fillRect(Math.random() * cw, Math.random() * ch, 1, 1);
          }
          b.globalAlpha = 1;
        } catch (e) {
          // ignore if ctx.filter not supported
        }

        // reset transform on content context so future draws are not scaled
        g.setTransform(1, 0, 0, 1, 0, 0);
      }

      function drawSectionHeader(g, label, pad, y, cw) {
        g.strokeStyle = "#1a1a1a";
        g.lineWidth = 1;
        g.beginPath(); g.moveTo(pad, y); g.lineTo(cw - pad, y); g.stroke();
        y += 25;
        g.fillStyle = "#1a1a1a";
        g.font = "900 " + Math.floor(cw * 0.028) + "px 'Playfair Display', serif";
        g.fillText(label, pad, y);
      }

      function wrapText(g, text, x, y, maxWidth, lineHeight) {
        const words = text.split(" ");
        let line = "";
        for (const w of words) {
          const test = line ? line + " " + w : w;
          if (g.measureText(test).width > maxWidth) {
            g.fillText(line, x, y);
            line = w; y += lineHeight;
          } else { line = test; }
        }
        g.fillText(line, x, y);
        return y + lineHeight;
      }

      function applyPointerForce() {
        if (!state.pointer.down) return;
        const p = state.pointer, rad = CONFIG.dragRadius;
        if (state.pinnedPoint) { state.pinnedPoint.x = p.x; state.pinnedPoint.y = p.y; }
        for (const pt of state.points) {
          if (pt === state.pinnedPoint) continue;
          const dx = p.x - pt.x, dy = p.y - pt.y, dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < rad) {
            const f = Math.pow(1 - dist / rad, 1.5) * CONFIG.dragForce;
            pt.x += dx * f; pt.y += dy * f;
          }
        }
      }

      function integrate() {
        const f = state.frame, pull = state.pointer.down ? CONFIG.homePull * 0.15 : CONFIG.homePull;
        for (const pt of state.points) {
          const vx = (pt.x - pt.px) * CONFIG.damping, vy = (pt.y - pt.py) * CONFIG.damping;
          pt.px = pt.x; pt.py = pt.y;
          pt.x += vx + Math.sin(f * 0.02 + pt.u * 10) * CONFIG.wind;
          pt.y += vy + CONFIG.gravity;
          pt.x += (pt.homeX - pt.x) * pull; pt.y += (pt.homeY - pt.y) * pull;
        }
      }

      function satisfyConstraints() {
        for (let iter = 0; iter < CONFIG.iterations; iter++) {
          for (const c of state.constraints) {
            const p1 = state.points[c.a], p2 = state.points[c.b];
            const dx = p2.x - p1.x, dy = p2.y - p1.y, dist = Math.hypot(dx, dy) || 0.0001;
            const diff = (dist - c.len) / dist;
            let stiff = diff > 0 ? c.stiff : CONFIG.compressionStiff;
            const corr = diff * stiff * 0.5;
            p1.x += dx * corr; p1.y += dy * corr; p2.x -= dx * corr; p2.y -= dy * corr;
          }
          if (state.pointer.down && state.pinnedPoint) {
            state.pinnedPoint.x = state.pointer.x; state.pinnedPoint.y = state.pointer.y;
          }
        }
        // compute a simple curvature per-vertex (Laplacian) used for wrinkle shading
        for (let y = 1; y < CONFIG.GRID_Y; y++) {
          for (let x = 1; x < CONFIG.GRID_X; x++) {
            const i = idx(x, y);
            const p = state.points[i];
            const left = state.points[idx(x - 1, y)];
            const right = state.points[idx(x + 1, y)];
            const up = state.points[idx(x, y - 1)];
            const down = state.points[idx(x, y + 1)];
            // curvature as distance from average neighbors
            const avgX = (left.x + right.x + up.x + down.x) * 0.25;
            const avgY = (left.y + right.y + up.y + down.y) * 0.25;
            const cx = p.x - avgX, cy = p.y - avgY;
            p.curv = Math.hypot(cx, cy);
          }
        }
      }

      function drawTriangle(img, p0, p1, p2, sw, sh) {
        // Calculate triangle signed area (cross product) to detect back-facing triangles
        const cp = (p1.x - p0.x) * (p2.y - p0.y) - (p1.y - p0.y) * (p2.x - p0.x);
        const areaRest = (state.sheetW / CONFIG.GRID_X) * (state.sheetH / CONFIG.GRID_Y) * 0.5;
        // shading magnitude — use absolute area so both folded and stretched tris get smooth shading
        const shading = clamp((1 - Math.abs(cp) / areaRest) * CONFIG.shadingIntensity, -0.25, 0.45);

        // Approximate a pseudo-normal from average displacement of triangle points.
        // This gives a simple tilt used for directional lighting and highlights.
        const ax = ((p0.homeX - p0.x) + (p1.homeX - p1.x) + (p2.homeX - p2.x)) / 3;
        const ay = ((p0.homeY - p0.y) + (p1.homeY - p1.y) + (p2.homeY - p2.y)) / 3;
        // build a simple 3D normal where z is positive and x/y are tilt scaled to sheet size
        let nx = ax / Math.max(1, state.sheetW) * 12;
        let ny = ay / Math.max(1, state.sheetH) * 12;
        let nz = 1;
        const nl = Math.hypot(nx, ny, nz) || 1; nx /= nl; ny /= nl; nz /= nl;
        // directional light (slightly from upper-left and above)
        const lx = -0.35, ly = -0.6, lz = 0.7;
        const ll = Math.hypot(lx, ly, lz); const lxN = lx / ll, lyN = ly / ll, lzN = lz / ll;
        const lightDot = clamp(nx * lxN + ny * lyN + nz * lzN, -1, 1);

        ctx.save();
        ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.closePath(); ctx.clip();

        // Back-facing: map a blurred/desaturated back texture to hide text and give paper underside
        if (cp < 0) {
          const sx0 = p0.u * sw, sy0 = p0.v * sh, sx1 = p1.u * sw, sy1 = p1.v * sh, sx2 = p2.u * sw, sy2 = p2.v * sh;
          const denom = (sx0 * (sy1 - sy2) + sx1 * (sy2 - sy0) + sx2 * (sy0 - sy1));
          if (Math.abs(denom) > 0.001) {
            const m11 = (p0.x * (sy1 - sy2) + p1.x * (sy2 - sy0) + p2.x * (sy0 - sy1)) / denom;
            const m12 = (p0.y * (sy1 - sy2) + p1.y * (sy2 - sy0) + p2.y * (sy0 - sy1)) / denom;
            const m21 = (p0.x * (sx2 - sx1) + p1.x * (sx0 - sx2) + p2.x * (sx1 - sx0)) / denom;
            const m22 = (p0.y * (sx2 - sx1) + p1.y * (sx0 - sx2) + p2.y * (sx1 - sx0)) / denom;
            const dx = (p0.x * (sx1 * sy2 - sx2 * sy1) + p1.x * (sx2 * sy0 - sx0 * sy2) + p2.x * (sx0 * sy1 - sx1 * sy0)) / denom;
            const dy = (p0.y * (sx1 * sy2 - sx2 * sy1) + p1.y * (sx2 * sy0 - sx0 * sy2) + p2.y * (sx0 * sy1 - sx1 * sy0)) / denom;
            ctx.imageSmoothingEnabled = true;
            try { ctx.imageSmoothingQuality = 'high'; } catch (e) { /* ignore */ }
            ctx.setTransform(m11, m12, m21, m22, dx, dy);
            // draw the backface texture (desaturated + blurred). Oversize slightly to hide seams.
            ctx.drawImage(state.backCanvas, -2, -2, sw + 4, sh + 4);
            // apply a slight warmening for creased/back areas by painting a translucent tint
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            // compute brightness offset from lighting
            const lite = clamp(0.45 + lightDot * 0.45, 0.1, 1.0);
            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = `rgba(245,238,225,${1 - lite})`;
            ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
          }
        } else {
          // Front-facing: map the content texture
          const sx0 = p0.u * sw, sy0 = p0.v * sh, sx1 = p1.u * sw, sy1 = p1.v * sh, sx2 = p2.u * sw, sy2 = p2.v * sh;
          const denom = (sx0 * (sy1 - sy2) + sx1 * (sy2 - sy0) + sx2 * (sy0 - sy1));
          if (Math.abs(denom) > 0.001) {
            const m11 = (p0.x * (sy1 - sy2) + p1.x * (sy2 - sy0) + p2.x * (sy0 - sy1)) / denom;
            const m12 = (p0.y * (sy1 - sy2) + p1.y * (sy2 - sy0) + p2.y * (sy0 - sy1)) / denom;
            const m21 = (p0.x * (sx2 - sx1) + p1.x * (sx0 - sx2) + p2.x * (sx1 - sx0)) / denom;
            const m22 = (p0.y * (sx2 - sx1) + p1.y * (sx0 - sx2) + p2.y * (sx1 - sx0)) / denom;
            const dx = (p0.x * (sx1 * sy2 - sx2 * sy1) + p1.x * (sx2 * sy0 - sx0 * sy2) + p2.x * (sx0 * sy1 - sx1 * sy0)) / denom;
            const dy = (p0.y * (sx1 * sy2 - sx2 * sy1) + p1.y * (sx2 * sy0 - sx0 * sy2) + p2.y * (sx0 * sy1 - sx1 * sy0)) / denom;
            ctx.imageSmoothingEnabled = true;
            try { ctx.imageSmoothingQuality = 'high'; } catch (e) { /* ignore */ }
            ctx.setTransform(m11, m12, m21, m22, dx, dy);
            ctx.drawImage(img, -1, -1, sw + 2, sh + 2);
          }
        }
        ctx.restore();

        // Add soft shading + subtle specular for curvature
        if (Math.abs(shading) > 0.01) {
          // base shadow/darken
          const darkAlpha = clamp(Math.abs(shading) * 0.6 + (1 - lightDot) * 0.12, 0, 0.6);
          ctx.fillStyle = `rgba(0,0,0,${darkAlpha})`;
          ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.fill();
          // small specular highlight on crests
          const spec = Math.pow(Math.max(0, lightDot), 18) * 0.18;
          if (spec > 0.003) {
            ctx.fillStyle = `rgba(255,255,255,${spec})`;
            ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.fill();
          }
        }
      }

      function drawPaper() {
        ctx.clearRect(0, 0, state.w, state.h);
        const center = state.points[idx(Math.floor(CONFIG.GRID_X / 2), Math.floor(CONFIG.GRID_Y / 2))];
        ctx.fillStyle = "rgba(0,0,0," + CONFIG.shadowAlpha + ")";
        ctx.filter = "blur(45px)";
        ctx.beginPath(); ctx.ellipse(center.x, center.y + 120, state.sheetW * 0.45, state.sheetH * 0.15, 0, 0, Math.PI * 2); ctx.fill();
        ctx.filter = "none";
        const img = state.contentCanvas, sw = img.width, sh = img.height;
        // subdivision for smoothing: break each quad into smaller quads for rendering only
        const subdiv = (window.DEBUG_SETTINGS && window.DEBUG_SETTINGS.subdivision) ? Math.max(1, Math.min(4, Math.floor(window.DEBUG_SETTINGS.subdivision))) : 1;
        for (let y = 0; y < CONFIG.GRID_Y; y++) {
          for (let x = 0; x < CONFIG.GRID_X; x++) {
            const p00 = state.points[idx(x, y)], p10 = state.points[idx(x + 1, y)];
            const p01 = state.points[idx(x, y + 1)], p11 = state.points[idx(x + 1, y + 1)];
            if (subdiv <= 1) {
              drawTriangle(img, p00, p10, p01, sw, sh); drawTriangle(img, p10, p11, p01, sw, sh);
            } else {
              // subdivide quad into (subdiv x subdiv) grid and draw small triangles
              for (let sy = 0; sy < subdiv; sy++) {
                const v0 = sy / subdiv, v1 = (sy + 1) / subdiv;
                for (let sx = 0; sx < subdiv; sx++) {
                  const u0 = sx / subdiv, u1 = (sx + 1) / subdiv;
                  // bilinear interpolate positions and UVs for four corners of sub-quad
                  function lerpPos(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, u: a.u + (b.u - a.u) * t, v: a.v + (b.v - a.v) * t } }
                  const leftTop = lerpPos(lerpPos(p00, p01, v0), lerpPos(p10, p11, v0), u0);
                  const rightTop = lerpPos(lerpPos(p00, p01, v0), lerpPos(p10, p11, v0), u1);
                  const leftBot = lerpPos(lerpPos(p00, p01, v1), lerpPos(p10, p11, v1), u0);
                  const rightBot = lerpPos(lerpPos(p00, p01, v1), lerpPos(p10, p11, v1), u1);
                  drawTriangle(img, leftTop, rightTop, leftBot, sw, sh);
                  drawTriangle(img, rightTop, rightBot, leftBot, sw, sh);
                }
              }
            }
          }
        }
      }

      function tick() { state.frame++; integrate(); applyPointerForce(); satisfyConstraints(); drawPaper(); requestAnimationFrame(tick); }
      function onPointer(e) { state.pointer.x = e.clientX; state.pointer.y = e.clientY; }
      canvas.addEventListener("pointerdown", e => {
        state.pointer.down = true; onPointer(e); canvas.classList.add("dragging");
        let minDist = Infinity;
        state.points.forEach(p => {
          const d = Math.hypot(p.x - state.pointer.x, p.y - state.pointer.y);
          if (d < minDist) { minDist = d; state.pinnedPoint = p; }
        });
      });
      window.addEventListener("pointermove", onPointer);
      window.addEventListener("pointerup", () => { state.pointer.down = false; state.pinnedPoint = null; canvas.classList.remove("dragging"); });
      window.addEventListener("resize", resize);
      // create debug UI (live tweak controls)
      function createDebugUI() {
        const wrap = document.createElement('div');
        wrap.style.position = 'fixed';
        wrap.style.left = '10px';
        wrap.style.top = '10px';
        wrap.style.background = 'rgba(255,255,255,0.85)';
        wrap.style.color = '#111';
        wrap.style.padding = '10px';
        wrap.style.borderRadius = '8px';
        wrap.style.fontFamily = 'sans-serif';
        wrap.style.fontSize = '12px';
        wrap.style.zIndex = 9999;
        wrap.style.maxWidth = '260px';
        wrap.style.boxShadow = '0 6px 20px rgba(0,0,0,0.12)';

        function addRow(labelText, input) {
          const row = document.createElement('div');
          row.style.marginBottom = '8px';
          const label = document.createElement('div');
          label.textContent = labelText;
          label.style.marginBottom = '3px';
          row.appendChild(label);
          row.appendChild(input);
          wrap.appendChild(row);
        }

        // meshScale
        const meshScaleInput = document.createElement('input');
        meshScaleInput.type = 'range'; meshScaleInput.min = 1; meshScaleInput.max = 3; meshScaleInput.step = 1; meshScaleInput.value = (window.DEBUG_SETTINGS.meshScale) ? window.DEBUG_SETTINGS.meshScale : (dpr >= 2 ? 2 : 1);
        meshScaleInput.oninput = () => { window.DEBUG_SETTINGS.meshScale = Number(meshScaleInput.value); resize(); };
        addRow('Mesh scale (physics grid)', meshScaleInput);

        // contentScale
        const contentScaleInput = document.createElement('input');
        contentScaleInput.type = 'range'; contentScaleInput.min = 1; contentScaleInput.max = 3; contentScaleInput.step = 1; contentScaleInput.value = (window.DEBUG_SETTINGS.contentScale) ? window.DEBUG_SETTINGS.contentScale : (dpr >= 2 ? 2 : 1);
        contentScaleInput.oninput = () => { window.DEBUG_SETTINGS.contentScale = Number(contentScaleInput.value); renderContentTexture(); };
        addRow('Content scale (raster)', contentScaleInput);

        // subdivision
        const subdivInput = document.createElement('input');
        subdivInput.type = 'range'; subdivInput.min = 1; subdivInput.max = 4; subdivInput.step = 1; subdivInput.value = window.DEBUG_SETTINGS.subdivision;
        subdivInput.oninput = () => { window.DEBUG_SETTINGS.subdivision = Number(subdivInput.value); };
        addRow('Render subdiv per quad', subdivInput);

        // weave density
        const weaveInput = document.createElement('input');
        weaveInput.type = 'range'; weaveInput.min = 0.3; weaveInput.max = 2; weaveInput.step = 0.1; weaveInput.value = window.DEBUG_SETTINGS.weaveDensity;
        weaveInput.oninput = () => { window.DEBUG_SETTINGS.weaveDensity = Number(weaveInput.value); renderContentTexture(); };
        addRow('Weave density', weaveInput);

        // back blur
        const blurInput = document.createElement('input');
        blurInput.type = 'range'; blurInput.min = 0; blurInput.max = 6; blurInput.step = 0.5; blurInput.value = window.DEBUG_SETTINGS.backBlur;
        blurInput.oninput = () => { window.DEBUG_SETTINGS.backBlur = Number(blurInput.value); renderContentTexture(); };
        addRow('Back blur px', blurInput);

        // back tint alpha
        const tintInput = document.createElement('input');
        tintInput.type = 'range'; tintInput.min = 0.0; tintInput.max = 1.0; tintInput.step = 0.05; tintInput.value = window.DEBUG_SETTINGS.backTintAlpha;
        tintInput.oninput = () => { window.DEBUG_SETTINGS.backTintAlpha = Number(tintInput.value); renderContentTexture(); };
        addRow('Back tint alpha', tintInput);

        // shading intensity
        const shadeInput = document.createElement('input');
        shadeInput.type = 'range'; shadeInput.min = 0; shadeInput.max = 1.0; shadeInput.step = 0.02; shadeInput.value = CONFIG.shadingIntensity;
        shadeInput.oninput = () => { CONFIG.shadingIntensity = Number(shadeInput.value); };
        addRow('Shading intensity', shadeInput);

        // reset
        const resetBtn = document.createElement('button');
        resetBtn.textContent = 'Reset';
        resetBtn.onclick = () => { window.DEBUG_SETTINGS = { meshScale: null, contentScale: null, subdivision: 1, weaveDensity: 1.0, backTintAlpha: 0.55, backBlur: 3 }; meshScaleInput.value = (dpr >= 2 ? 2 : 1); contentScaleInput.value = (dpr >= 2 ? 2 : 1); subdivInput.value = 1; weaveInput.value = 1; blurInput.value = 3; tintInput.value = 0.55; shadeInput.value = CONFIG.shadingIntensity; resize(); renderContentTexture(); };
        wrap.appendChild(resetBtn);

        document.body.appendChild(wrap);
      }

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('debug') === 'true') {
        createDebugUI();
      }
      resize(); tick();
    })();
  </script>
</body>

</html>
